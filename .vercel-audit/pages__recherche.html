<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Découverte — Peakly</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/style.css">
<style>
.page-wrap{max-width:1280px;margin:0 auto;padding:40px 24px}
/* Hero recherche */
.rech-hero{text-align:center;padding:40px 0 48px}
.rech-hero h1{font-family:"Plus Jakarta Sans",sans-serif;font-weight:900;font-size:2.4rem;color:var(--txt);margin-bottom:10px;letter-spacing:-.03em}
.rech-hero h1 span{color:var(--or)}
.rech-hero p{font-size:.95rem;color:var(--txt2);margin-bottom:32px}
.rech-barre-wrap{position:relative;max-width:640px;margin:0 auto}
.rech-barre{
  width:100%;padding:18px 24px 18px 56px;
  background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);
  border-radius:16px;font-size:1rem;color:var(--txt);font-family:"Inter",sans-serif;
  outline:none;transition:border-color .2s,background .2s;
}
.rech-barre:focus{border-color:rgba(229,193,88,.4);background:rgba(255,255,255,.08)}
.rech-barre::placeholder{color:rgba(148,163,184,.5)}
.rech-barre-icone{position:absolute;left:20px;top:50%;transform:translateY(-50%);color:var(--txt3);pointer-events:none}
.rech-barre-clear{
  position:absolute;right:16px;top:50%;transform:translateY(-50%);
  width:24px;height:24px;border-radius:50%;background:rgba(255,255,255,.1);
  border:none;cursor:pointer;color:var(--txt2);font-size:.8rem;
  display:none;align-items:center;justify-content:center;transition:background .15s;
}
.rech-barre-clear.visible{display:flex}
.rech-barre-clear:hover{background:rgba(255,255,255,.18)}
/* Suggestions rapides */
.rech-suggestions{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:14px}
.rech-sugg{
  padding:7px 16px;border-radius:999px;
  border:1px solid var(--bordure);background:var(--glass);
  font-size:.78rem;color:var(--txt2);cursor:pointer;
  transition:all .15s;
}
.rech-sugg:hover{border-color:var(--or-glow);background:var(--or-dim);color:var(--or)}
/* Filtres */
.filtres-bar{
  display:flex;align-items:center;gap:10px;flex-wrap:wrap;
  background:rgba(255,255,255,.03);border:1px solid var(--bordure);
  border-radius:var(--r);padding:16px 20px;margin-bottom:28px;
}
.filtre-label{font-size:.72rem;font-weight:700;color:var(--txt3);text-transform:uppercase;letter-spacing:.08em;margin-right:4px;white-space:nowrap}
.filtre-select{
  padding:7px 14px;border-radius:999px;
  background:var(--glass);border:1px solid var(--bordure);
  color:var(--txt2);font-size:.8rem;font-family:"Inter",sans-serif;
  cursor:pointer;outline:none;transition:all .15s;
}
.filtre-select:focus,.filtre-select:hover{border-color:rgba(229,193,88,.3);color:var(--txt)}
.filtre-select option{background:var(--nuit3)}
.filtre-sep{width:1px;height:20px;background:var(--bordure);flex-shrink:0}
.filtre-dispo{display:flex;align-items:center;gap:8px;cursor:pointer;font-size:.82rem;color:var(--txt2)}
.filtre-dispo input{accent-color:var(--or)}
.filtres-reset{margin-left:auto;font-size:.75rem;color:var(--or);cursor:pointer;background:none;border:none;font-family:"Inter",sans-serif;font-weight:600}
.filtres-reset:hover{text-decoration:underline}
/* Infos résultats */
.rech-meta{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.rech-count{font-size:.82rem;color:var(--txt3)}
.rech-count strong{color:var(--txt)}
.rech-tri{display:flex;align-items:center;gap:8px}
.tri-label{font-size:.78rem;color:var(--txt3)}
.tri-select{padding:6px 12px;border-radius:8px;background:var(--glass);border:1px solid var(--bordure);color:var(--txt2);font-size:.78rem;cursor:pointer;outline:none;font-family:"Inter",sans-serif}
/* Grille résultats */
.rech-grille{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:18px}
/* Carte artiste */
.rech-card{
  background:var(--glass);border:1px solid var(--bordure);border-radius:var(--r);
  padding:22px;cursor:pointer;transition:all .22s;position:relative;overflow:hidden;
}
.rech-card::before{
  content:'';position:absolute;inset:0;opacity:0;
  background:linear-gradient(135deg,var(--or-dim),transparent 60%);
  transition:opacity .22s;
}
.rech-card:hover{border-color:var(--or-glow);transform:translateY(-3px);box-shadow:0 12px 40px rgba(0,0,0,.5)}
.rech-card:hover::before{opacity:1}
.rech-card-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px;position:relative}
.rech-avatar{
  width:48px;height:48px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-family:"Plus Jakarta Sans",sans-serif;font-weight:800;font-size:1rem;
  color:var(--texte-fonce);flex-shrink:0;
}
.rech-badge-score{
  display:flex;flex-direction:column;align-items:center;
  background:var(--or-dim);border:1px solid var(--or-glow);
  border-radius:10px;padding:8px 12px;
}
.rech-score-num{font-family:"JetBrains Mono",monospace;font-weight:700;font-size:1.1rem;color:var(--or);line-height:1}
.rech-score-lbl{font-size:.58rem;color:var(--txt3);text-transform:uppercase;letter-spacing:.08em;margin-top:2px}
.rech-nom{font-family:"Plus Jakarta Sans",sans-serif;font-weight:800;font-size:1rem;color:var(--txt);margin-bottom:3px}
.rech-genre{font-size:.78rem;color:var(--txt2);margin-bottom:8px}
.rech-meta-card{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:12px}
.rech-meta-item{display:flex;align-items:center;gap:5px;font-size:.72rem;color:var(--txt3)}
.rech-meta-item svg{flex-shrink:0}
.rech-tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px}
.rech-tag{padding:3px 9px;border-radius:999px;font-size:.67rem;font-weight:600;background:rgba(255,255,255,.06);border:1px solid var(--bordure);color:var(--txt2)}
.rech-card-footer{display:flex;align-items:center;justify-content:space-between}
.rech-streams{font-size:.75rem;color:var(--txt3)}
.rech-streams strong{color:var(--txt2);font-weight:700}
.btn-voir-profil{
  padding:7px 16px;border-radius:8px;
  background:var(--or);color:var(--texte-fonce);
  font-family:"Plus Jakarta Sans",sans-serif;font-weight:700;font-size:.75rem;
  border:none;cursor:pointer;transition:all .15s;
}
.btn-voir-profil:hover{background:var(--or-h);transform:translateY(-1px)}
.rech-dispo-dot{width:7px;height:7px;border-radius:50%;background:var(--vert);display:inline-block;margin-right:3px}
/* Carte label/pro */
.rech-card.type-pro .rech-avatar{background:rgba(96,165,250,.15);border:1px solid rgba(96,165,250,.2)}
/* Etat vide / squelette */
.etat-vide-wrap{display:flex;flex-direction:column;align-items:center;padding:80px 0;text-align:center}
.etat-vide-icone2{font-size:2.5rem;margin-bottom:16px;opacity:.3}
.etat-vide-titre2{font-family:"Plus Jakarta Sans",sans-serif;font-weight:700;font-size:1.1rem;color:var(--txt);margin-bottom:8px}
.etat-vide-texte2{font-size:.85rem;color:var(--txt2)}
/* Skeleton */
.skel-card{background:var(--glass);border:1px solid var(--bordure);border-radius:var(--r);padding:22px}
.skel-row{border-radius:6px;margin-bottom:10px}
</style>
</head>
<body>
<div id="nav-root"></div>

<div class="page-wrap">
  <!-- Hero -->
  <div class="rech-hero">
    <h1>Découvrez les <span>meilleurs talents</span></h1>
    <p>8 400 artistes analysés par l'IA Peakly. Filtrez, comparez, contactez.</p>
    <div class="rech-barre-wrap">
      <svg class="rech-barre-icone" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="search" id="barreRech" class="rech-barre" placeholder="Rappeur parisien, chanteuse RnB, beatmaker...">
      <button class="rech-barre-clear" id="btnClear" onclick="clearRecherche()">✕</button>
    </div>
    <div class="rech-suggestions">
      <span class="rech-sugg" onclick="lancerSugg('Afrobeats')">Afrobeats</span>
      <span class="rech-sugg" onclick="lancerSugg('RnB Soul')">RnB / Soul</span>
      <span class="rech-sugg" onclick="lancerSugg('Rap')">Rap français</span>
      <span class="rech-sugg" onclick="lancerSugg('Pop')">Pop alternative</span>
      <span class="rech-sugg" onclick="lancerSugg('Jazz')">Jazz</span>
      <span class="rech-sugg" onclick="lancerSugg('')">Tous les artistes</span>
    </div>
  </div>

  <!-- Filtres -->
  <div class="filtres-bar">
    <span class="filtre-label">Filtres</span>
    <select class="filtre-select" id="filtreType" onchange="appliquerFiltres()">
      <option value="">Tous types</option>
      <option value="artiste">Artistes</option>
      <option value="label">Labels</option>
      <option value="professionnel">Professionnels</option>
    </select>
    <div class="filtre-sep"></div>
    <select class="filtre-select" id="filtreGenre" onchange="appliquerFiltres()">
      <option value="">Tous genres</option>
      <option>Rap / Hip-Hop</option><option>RnB / Soul</option>
      <option>Pop</option><option>Afrobeats</option>
      <option>Jazz</option><option>Électro</option><option>Rock</option>
    </select>
    <div class="filtre-sep"></div>
    <select class="filtre-select" id="filtreVille" onchange="appliquerFiltres()">
      <option value="">Toutes les villes</option>
      <option>Paris</option><option>Lyon</option><option>Marseille</option>
      <option>Bordeaux</option><option>Nantes</option><option>Strasbourg</option>
    </select>
    <div class="filtre-sep"></div>
    <select class="filtre-select" id="filtreScore" onchange="appliquerFiltres()">
      <option value="0">Score minimum</option>
      <option value="60">Score 60+</option>
      <option value="70">Score 70+</option>
      <option value="80">Score 80+</option>
      <option value="90">Score 90+</option>
    </select>
    <div class="filtre-sep"></div>
    <label class="filtre-dispo"><input type="checkbox" id="filtreDispo" onchange="appliquerFiltres()"> Disponibles</label>
    <button class="filtres-reset" onclick="reinitFiltres()">Réinitialiser</button>
  </div>

  <!-- Méta résultats -->
  <div class="rech-meta">
    <div class="rech-count" id="rechCount"><strong>0</strong> résultats</div>
    <div class="rech-tri">
      <span class="tri-label">Trier par</span>
      <select class="tri-select" id="triSelect" onchange="appliquerFiltres()">
        <option value="score">Talent Score</option>
        <option value="streams">Streams</option>
        <option value="momentum">Momentum</option>
        <option value="abonnes">Abonnés</option>
      </select>
    </div>
  </div>

  <!-- Résultats -->
  <div class="rech-grille" id="rechGrille"></div>
</div>

<div id="toastContainer" class="toast-container"></div>

<script src="../js/store.js"></script>
<script src="../js/app.js"></script>
<script src="../js/navigation.js"></script>
<script>
function fmtN(n){
  if(n >= 1000000) return (n/1000000).toFixed(1)+'M';
  if(n >= 1000) return (n/1000).toFixed(0)+'K';
  return n;
}

function rendreCarte(item){
  const isArtiste = item._type !== 'professionnel';
  if(isArtiste){
    return `<div class="rech-card reveal" onclick="window.location.href='${item.link || '/profil-artiste.html'}'">
      <div class="rech-card-header">
        <div style="display:flex;align-items:center;gap:12px">
          <div class="rech-avatar" style="background:${item.couleur}22;border:1px solid ${item.couleur}44;color:${item.couleur}">${item.avatar}</div>
          <div>
            <div class="rech-nom">${item.nom}${item.verifie?'<svg style="display:inline;margin-left:5px;vertical-align:middle" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--bleu)" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>':''}</div>
            <div class="rech-genre">${item.genre}</div>
          </div>
        </div>
        <div class="rech-badge-score">
          <div class="rech-score-num">${item.score}</div>
          <div class="rech-score-lbl">Score</div>
        </div>
      </div>
      <div class="rech-meta-card">
        <div class="rech-meta-item"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>${item.ville}</div>
        <div class="rech-meta-item">${item.disponible?'<span class="rech-dispo-dot"></span>Disponible':'Indisponible'}</div>
      </div>
      <div class="rech-tags">${(item.genres||[]).map(g=>`<span class="rech-tag">${g}</span>`).join('')}</div>
      <div class="rech-card-footer">
        <div class="rech-streams"><strong>${fmtN(item.streams)}</strong> streams · <strong>${fmtN(item.auditeurs)}</strong> auditeurs</div>
        <button class="btn-voir-profil" onclick="event.stopPropagation();window.location.href='${item.link||'/profil-artiste.html'}'">Voir profil</button>
      </div>
    </div>`;
  } else {
    return `<div class="rech-card type-pro reveal" onclick="window.location.href='${item.link||'/profil-pro.html'}'">
      <div class="rech-card-header">
        <div style="display:flex;align-items:center;gap:12px">
          <div class="rech-avatar" style="background:rgba(96,165,250,.15);border:1px solid rgba(96,165,250,.3);color:var(--bleu);font-size:.9rem">${item.avatar}</div>
          <div>
            <div class="rech-nom">${item.nom}${item.verifie?'<svg style="display:inline;margin-left:5px;vertical-align:middle" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--bleu)" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>':''}</div>
            <div class="rech-genre">${item.type}</div>
          </div>
        </div>
        <span class="badge-type badge-label">${item.type.split(' ')[0]}</span>
      </div>
      <div class="rech-meta-card">
        <div class="rech-meta-item"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>${item.ville}</div>
        <div class="rech-meta-item">${item.opportunites_actives} offres actives</div>
      </div>
      <div class="rech-tags"><span class="rech-tag">${item.specialite}</span></div>
      <div class="rech-card-footer">
        <div class="rech-streams"><strong>${item.artistes_signes}</strong> artistes signés</div>
        <button class="btn-voir-profil" onclick="event.stopPropagation();window.location.href='${item.link||'/profil-pro.html'}'">Voir profil</button>
      </div>
    </div>`;
  }
}

function afficherResultats(items){
  const grille = document.getElementById('rechGrille');
  const count  = document.getElementById('rechCount');
  count.innerHTML = `<strong>${items.length}</strong> résultat${items.length!==1?'s':''}`;
  if(items.length === 0){
    grille.innerHTML = `<div class="etat-vide-wrap" style="grid-column:1/-1">
      <div class="etat-vide-icone2">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="rgba(229,193,88,.3)" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      </div>
      <div class="etat-vide-titre2">Aucun résultat</div>
      <div class="etat-vide-texte2">Essayez d'autres termes ou élargissez vos filtres.</div>
    </div>`;
    return;
  }
  grille.innerHTML = items.map(rendreCarte).join('');
  grille.querySelectorAll('.reveal').forEach(el=>{
    setTimeout(()=>el.classList.add('visible'), 50);
  });
}

function appliquerFiltres(){
  const q = document.getElementById('barreRech').value.trim();
  const filtres = {
    type: document.getElementById('filtreType').value,
    genre: document.getElementById('filtreGenre').value,
    ville: document.getElementById('filtreVille').value,
    scoreMin: parseInt(document.getElementById('filtreScore').value) || 0,
    disponible: document.getElementById('filtreDispo').checked,
  };
  const tri = document.getElementById('triSelect').value;
  let res = PeaklyStore.searchTous(q, filtres);
  res.sort((a,b)=>{
    if(tri==='score') return (b.score||0)-(a.score||0);
    if(tri==='streams') return (b.streams||0)-(a.streams||0);
    if(tri==='momentum') return (b.momentum||0)-(a.momentum||0);
    if(tri==='abonnes') return (b.abonnes||0)-(a.abonnes||0);
    return 0;
  });
  afficherResultats(res);
  const clear = document.getElementById('btnClear');
  clear.classList.toggle('visible', q.length > 0);
}

function reinitFiltres(){
  document.getElementById('filtreType').value='';
  document.getElementById('filtreGenre').value='';
  document.getElementById('filtreVille').value='';
  document.getElementById('filtreScore').value='0';
  document.getElementById('filtreDispo').checked=false;
  document.getElementById('barreRech').value='';
  document.getElementById('btnClear').classList.remove('visible');
  appliquerFiltres();
}

function lancerSugg(q){
  document.getElementById('barreRech').value = q;
  appliquerFiltres();
}

function clearRecherche(){
  document.getElementById('barreRech').value='';
  document.getElementById('btnClear').classList.remove('visible');
  appliquerFiltres();
}

/* Init */
document.addEventListener('DOMContentLoaded', function(){
  const urlParams = new URLSearchParams(window.location.search);
  const q = urlParams.get('q') || '';
  if(q) document.getElementById('barreRech').value = q;
  appliquerFiltres();
  document.getElementById('barreRech').addEventListener('input', appliquerFiltres);
});
</script>
</body>
</html>
