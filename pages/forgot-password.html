<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Mot de passe oublié — Peakly</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/style.css">
<style>
body { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: var(--nuit2); padding: 20px; }
.auth-bg { position: fixed; inset: 0; z-index: 0; overflow: hidden; }
.auth-orb { position: absolute; border-radius: 50%; filter: blur(80px); }
.auth-orb.o1 { width: 500px; height: 500px; background: rgba(229,193,88,.06); top: -100px; left: -100px; animation: orb-drift 12s ease-in-out infinite alternate; }
.auth-orb.o2 { width: 400px; height: 400px; background: rgba(96,165,250,.04); bottom: -80px; right: -80px; animation: orb-drift 15s ease-in-out infinite alternate-reverse; }
.auth-card { position: relative; z-index: 1; width: 100%; max-width: 420px; background: rgba(255,255,255,.03); border: 1px solid rgba(255,255,255,.09); border-radius: 20px; padding: 40px; backdrop-filter: blur(24px); box-shadow: 0 32px 80px rgba(0,0,0,.5); }
.auth-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px; background: linear-gradient(90deg, transparent, rgba(229,193,88,.4), transparent); border-radius: 20px 20px 0 0; }
.auth-logo { display: flex; align-items: center; justify-content: center; margin-bottom: 28px; }
.auth-title { font-family: 'Plus Jakarta Sans', sans-serif; font-weight: 900; font-size: 1.35rem; color: var(--txt); text-align: center; margin-bottom: 8px; }
.auth-sub { font-size: .83rem; color: var(--txt2); text-align: center; line-height: 1.55; margin-bottom: 28px; }
.form-field { margin-bottom: 16px; }
.form-field label { display: block; font-size: .72rem; font-weight: 700; color: var(--txt2); margin-bottom: 6px; letter-spacing: .06em; text-transform: uppercase; }
.form-field input { width: 100%; padding: 12px 14px; background: rgba(255,255,255,.04); border: 1px solid rgba(255,255,255,.09); border-radius: 10px; color: var(--txt); font-family: 'Inter', sans-serif; font-size: .88rem; outline: none; transition: border-color .2s, box-shadow .2s; box-sizing: border-box; }
.form-field input:focus { border-color: rgba(229,193,88,.4); box-shadow: 0 0 0 3px rgba(229,193,88,.08); }
.form-field input::placeholder { color: rgba(148,163,184,.35); }
.btn-submit { width: 100%; padding: 13px; border-radius: 12px; background: linear-gradient(135deg, #E5C158, #C9A53F); color: #0a0d14; font-family: 'Plus Jakarta Sans', sans-serif; font-weight: 800; font-size: .9rem; border: none; cursor: pointer; transition: transform .2s cubic-bezier(.34,1.56,.64,1), box-shadow .2s; margin-top: 4px; }
.btn-submit:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(229,193,88,.35); }
.btn-submit:disabled { opacity: .6; transform: none; cursor: not-allowed; }
.auth-back { text-align: center; margin-top: 20px; font-size: .8rem; color: var(--txt3); }
.auth-back a { color: var(--or); text-decoration: none; font-weight: 600; }
.auth-back a:hover { text-decoration: underline; }
.success-box { display: none; text-align: center; padding: 24px; }
.success-icon { width: 56px; height: 56px; border-radius: 50%; background: rgba(74,222,128,.12); border: 1px solid rgba(74,222,128,.25); display: flex; align-items: center; justify-content: center; margin: 0 auto 16px; }
.success-title { font-family: 'Plus Jakarta Sans', sans-serif; font-weight: 800; font-size: 1.1rem; color: var(--txt); margin-bottom: 8px; }
.success-text { font-size: .83rem; color: var(--txt2); line-height: 1.6; }
</style>
</head>
<body>
<div class="auth-bg">
  <div class="auth-orb o1"></div>
  <div class="auth-orb o2"></div>
</div>

<div class="auth-card">
  <div class="auth-logo">
    <img src="../logo-peakly-nav.png" alt="Peakly" height="28">
  </div>

  <!-- Formulaire -->
  <div id="formSection">
    <h1 class="auth-title">Mot de passe oublié</h1>
    <p class="auth-sub">Renseignez votre adresse email. Nous vous enverrons un lien pour réinitialiser votre mot de passe.</p>

    <form id="forgotForm" novalidate>
      <div class="form-field">
        <label for="email">Adresse email</label>
        <input type="email" id="email" name="email" placeholder="votre@email.com" autocomplete="email" required>
      </div>
      <button type="submit" class="btn-submit" id="submitBtn">Envoyer le lien</button>
    </form>
  </div>

  <!-- Message de succès -->
  <div id="successSection" class="success-box">
    <div class="success-icon">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#4ade80" stroke-width="2.5"><path d="M20 6L9 17l-5-5"/></svg>
    </div>
    <div class="success-title">Email envoyé</div>
    <p class="success-text">Si un compte existe avec cette adresse, vous recevrez un lien de réinitialisation dans quelques minutes. Vérifiez vos spams.</p>
  </div>

  <div class="auth-back">
    <a href="/pages/login.html">Retour à la connexion</a>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.0/dist/umd/supabase.min.js"></script>
<script src="../js/services/supabase.js"></script>
<script src="../js/services/auth.js"></script>
<script src="../js/utils/validation.js"></script>
<script>
document.getElementById('forgotForm').addEventListener('submit', async function(e){
  e.preventDefault();
  const emailEl = document.getElementById('email');
  const btn     = document.getElementById('submitBtn');
  const v       = PeaklyValidation;

  v.clearError(emailEl);
  if(!v.email(emailEl.value)){ v.showError(emailEl, 'Adresse email invalide.'); return; }

  btn.disabled = true;
  btn.textContent = 'Envoi en cours…';

  try {
    await PeaklyAuth.forgotPassword(emailEl.value.trim());
    document.getElementById('formSection').style.display = 'none';
    document.getElementById('successSection').style.display = 'block';
  } catch(err) {
    /* On affiche toujours le succès pour ne pas révéler si l'email existe */
    document.getElementById('formSection').style.display = 'none';
    document.getElementById('successSection').style.display = 'block';
  }
  btn.textContent = 'Envoyer le lien';
  btn.disabled = false;
}
</script>
</body>
</html>
