<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Notifications — Peakly</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/style.css">
<style>
.page-wrap{max-width:760px;margin:0 auto;padding:40px 24px}
.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:32px}
.page-titre{font-family:"Plus Jakarta Sans",sans-serif;font-weight:900;font-size:1.6rem;color:var(--txt);letter-spacing:-.02em}
.btn-tout-lire{padding:8px 18px;border-radius:8px;background:var(--glass);border:1px solid var(--bordure);color:var(--txt2);font-size:.8rem;font-weight:600;cursor:pointer;transition:all .15s;font-family:"Inter",sans-serif}
.btn-tout-lire:hover{background:var(--glass2);color:var(--txt)}
.notif-date-sep{font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--txt3);margin:24px 0 10px;padding:0 4px}
.notif-date-sep:first-child{margin-top:0}
.notif-item{
  display:flex;align-items:flex-start;gap:14px;
  padding:16px 18px;border-radius:var(--r);border:1px solid transparent;
  cursor:pointer;transition:all .18s;position:relative;margin-bottom:6px;
}
.notif-item:hover{background:var(--glass);border-color:var(--bordure)}
.notif-item.non-lu{background:var(--glass);border-color:var(--bordure2)}
.notif-item.non-lu::before{
  content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);
  width:3px;height:60%;background:var(--or);border-radius:0 3px 3px 0;
}
.notif-icone{
  width:40px;height:40px;border-radius:12px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
}
.notif-icone.opportunite{background:var(--or-dim);border:1px solid var(--or-glow)}
.notif-icone.follow{background:rgba(96,165,250,.1);border:1px solid rgba(96,165,250,.2)}
.notif-icone.bigup{background:rgba(167,139,250,.1);border:1px solid rgba(167,139,250,.2)}
.notif-icone.score{background:rgba(74,222,128,.1);border:1px solid rgba(74,222,128,.2)}
.notif-icone.message{background:rgba(251,146,60,.1);border:1px solid rgba(251,146,60,.2)}
.notif-icone.vue{background:rgba(255,255,255,.06);border:1px solid var(--bordure)}
.notif-corps{flex:1;min-width:0}
.notif-titre{font-family:"Plus Jakarta Sans",sans-serif;font-weight:700;font-size:.88rem;color:var(--txt);margin-bottom:3px}
.notif-item.non-lu .notif-titre{color:var(--txt)}
.notif-texte{font-size:.8rem;color:var(--txt2);line-height:1.5}
.notif-heure{font-size:.68rem;color:var(--txt3);margin-top:5px;display:flex;align-items:center;gap:6px}
.notif-dot-nl{width:6px;height:6px;border-radius:50%;background:var(--or);flex-shrink:0}
.notif-action{
  padding:7px 14px;border-radius:8px;
  background:var(--glass);border:1px solid var(--bordure);
  color:var(--txt2);font-size:.75rem;font-weight:600;
  cursor:pointer;transition:all .15s;white-space:nowrap;flex-shrink:0;
  font-family:"Inter",sans-serif;
}
.notif-action:hover{background:var(--or-dim);border-color:var(--or-glow);color:var(--or)}
.notif-vide{text-align:center;padding:60px 0}
</style>
</head>
<body>
<div id="nav-root"></div>
<div class="page-wrap">
  <div class="page-header">
    <div class="page-titre">Notifications</div>
    <button class="btn-tout-lire" onclick="toutMarquerLu()">Tout marquer comme lu</button>
  </div>
  <div id="notifsWrap"></div>
</div>
<script src="../js/store.js"></script>
<script src="../js/app.js"></script>
<script src="../js/navigation.js"></script>
<script>
const ICONES = {
  opportunite:`<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--or)" stroke-width="2"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>`,
  follow:`<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--bleu)" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>`,
  bigup:`<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--violet)" stroke-width="2"><path d="M14 9V5a3 3 0 0 0-3-3l-4 9v11h11.28a2 2 0 0 0 2-1.7l1.38-9a2 2 0 0 0-2-2.3H14z"/><path d="M7 22H4a2 2 0 0 1-2-2v-7a2 2 0 0 1 2-2h3"/></svg>`,
  score:`<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--vert)" stroke-width="2"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>`,
  message:`<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--orange)" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>`,
  vue:`<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--txt2)" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>`,
};

function fmtHeure(ts){
  const diff = Date.now() - ts;
  if(diff < 60000) return 'à l\'instant';
  if(diff < 3600000) return 'il y a ' + Math.round(diff/60000) + ' min';
  if(diff < 86400000) return 'il y a ' + Math.round(diff/3600000) + 'h';
  if(diff < 604800000) return 'il y a ' + Math.round(diff/86400000) + ' jour' + (Math.round(diff/86400000)>1?'s':'');
  return new Date(ts).toLocaleDateString('fr-FR',{day:'numeric',month:'long'});
}

function rendreNotifs(){
  const notifs = PeaklyStore.getNotifs();
  const wrap = document.getElementById('notifsWrap');
  if(notifs.length === 0){
    wrap.innerHTML = '<div class="notif-vide"><div style="font-size:.9rem;color:var(--txt2)">Aucune notification pour l\'instant.</div></div>';
    return;
  }
  const now = Date.now();
  const auj = notifs.filter(n => now-n.ts < 86400000);
  const sem = notifs.filter(n => now-n.ts >= 86400000 && now-n.ts < 604800000);
  const plus = notifs.filter(n => now-n.ts >= 604800000);

  let html = '';
  function rendreLot(lot, titre){
    if(!lot.length) return '';
    let h = `<div class="notif-date-sep">${titre}</div>`;
    lot.forEach(n => {
      h += `<div class="notif-item${n.lu?'':' non-lu'} reveal" onclick="ouvrirNotif('${n.id}','${n.lien||''}')">
        <div class="notif-icone ${n.type}">${ICONES[n.type]||''}</div>
        <div class="notif-corps">
          <div class="notif-titre">${n.titre}</div>
          <div class="notif-texte">${n.texte}</div>
          <div class="notif-heure">${n.lu?'':' <span class="notif-dot-nl"></span>'}${fmtHeure(n.ts)}</div>
        </div>
        ${n.type==='opportunite'?`<button class="notif-action" onclick="event.stopPropagation();window.location.href='../crm.html'">Voir</button>`:''}
      </div>`;
    });
    return h;
  }
  html += rendreLot(auj, "Aujourd'hui");
  html += rendreLot(sem, "Cette semaine");
  html += rendreLot(plus, "Plus ancien");

  wrap.innerHTML = html;
  wrap.querySelectorAll('.reveal').forEach(el=>{setTimeout(()=>el.classList.add('visible'),30)});
}

function ouvrirNotif(id, lien){
  const notifs = PeaklyStore.getNotifs().map(n=>n.id===id?{...n,lu:true}:n);
  localStorage.setItem('pkly_notifs', JSON.stringify(notifs));
  if(lien && lien!=='undefined') window.location.href = lien;
  else rendreNotifs();
}

function toutMarquerLu(){
  PeaklyStore.marquerNotifsLues();
  rendreNotifs();
}

rendreNotifs();
</script>
</body>
</html>
