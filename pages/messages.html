<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Messages — Peakly</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/style.css">
<style>
body{overflow:hidden}
.msg-wrap{display:grid;grid-template-columns:320px 1fr;height:calc(100vh - 58px)}
@media(max-width:768px){.msg-wrap{grid-template-columns:1fr}.msg-chat-area{display:none}.msg-sidebar.conv-open .msg-sidebar{display:none}.msg-sidebar.conv-open~.msg-chat-area{display:flex}}
/* Sidebar conversations */
.msg-sidebar{
  background:var(--nuit3);border-right:1px solid var(--bordure);
  display:flex;flex-direction:column;overflow:hidden;
}
.msg-sidebar-header{
  padding:18px 20px 14px;border-bottom:1px solid var(--bordure);
  display:flex;align-items:center;justify-content:space-between;flex-shrink:0;
}
.msg-sidebar-titre{font-family:"Plus Jakarta Sans",sans-serif;font-weight:800;font-size:1rem;color:var(--txt)}
.msg-sidebar-nb{
  background:var(--corail);color:#fff;border-radius:999px;
  font-size:.65rem;font-weight:800;padding:2px 7px;
}
.msg-search{padding:12px 16px;border-bottom:1px solid var(--bordure);flex-shrink:0}
.msg-search-inp{
  width:100%;padding:9px 14px 9px 36px;
  background:rgba(255,255,255,.05);border:1px solid var(--bordure);
  border-radius:999px;font-size:.82rem;color:var(--txt);
  font-family:"Inter",sans-serif;outline:none;
}
.msg-search-inp:focus{border-color:rgba(229,193,88,.3)}
.msg-search-wrap{position:relative}
.msg-search-ico{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--txt3);pointer-events:none}
/* Liste conversations */
.msg-convs{flex:1;overflow-y:auto;padding:6px}
.msg-conv{
  display:flex;align-items:flex-start;gap:12px;
  padding:12px 14px;border-radius:10px;cursor:pointer;
  transition:background .12s;position:relative;
}
.msg-conv:hover{background:rgba(255,255,255,.05)}
.msg-conv.actif{background:var(--or-dim);border:1px solid var(--or-glow)}
.msg-conv-avatar{
  width:42px;height:42px;border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-family:"Plus Jakarta Sans",sans-serif;font-weight:800;font-size:.9rem;
  color:var(--texte-fonce);
}
.msg-conv-body{flex:1;min-width:0}
.msg-conv-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:3px}
.msg-conv-nom{font-weight:700;font-size:.85rem;color:var(--txt);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.msg-conv-heure{font-size:.68rem;color:var(--txt3);flex-shrink:0}
.msg-conv-dernier{font-size:.78rem;color:var(--txt2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.msg-conv-badge{
  position:absolute;top:14px;right:14px;
  width:18px;height:18px;border-radius:50%;background:var(--or);
  font-size:.62rem;font-weight:800;color:var(--texte-fonce);
  display:flex;align-items:center;justify-content:center;
}
/* Zone chat */
.msg-chat-area{display:flex;flex-direction:column;overflow:hidden;background:var(--nuit2)}
.msg-chat-header{
  padding:16px 24px;border-bottom:1px solid var(--bordure);
  display:flex;align-items:center;gap:14px;flex-shrink:0;
  background:var(--nuit3);
}
.msg-chat-avatar{
  width:38px;height:38px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-family:"Plus Jakarta Sans",sans-serif;font-weight:800;font-size:.85rem;color:var(--texte-fonce);
}
.msg-chat-infos{flex:1}
.msg-chat-nom{font-family:"Plus Jakarta Sans",sans-serif;font-weight:800;font-size:.92rem;color:var(--txt)}
.msg-chat-statut{font-size:.72rem;color:var(--vert);display:flex;align-items:center;gap:5px}
.msg-chat-statut::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--vert)}
.msg-chat-actions{display:flex;gap:8px}
.msg-chat-action{
  width:36px;height:36px;border-radius:50%;
  background:var(--glass);border:1px solid var(--bordure);
  color:var(--txt2);display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:all .15s;
}
.msg-chat-action:hover{background:var(--glass2);color:var(--txt);border-color:var(--b2)}
/* Messages */
.msg-bulles{flex:1;overflow-y:auto;padding:24px;display:flex;flex-direction:column;gap:16px}
.msg-date-sep{text-align:center;position:relative;margin:4px 0}
.msg-date-sep::before{content:'';position:absolute;top:50%;left:0;right:0;height:1px;background:var(--bordure)}
.msg-date-sep span{position:relative;background:var(--nuit2);padding:0 12px;font-size:.68rem;color:var(--txt3)}
.msg-bulle-wrap{display:flex;flex-direction:column;max-width:72%;gap:3px}
.msg-bulle-wrap.moi{align-self:flex-end;align-items:flex-end}
.msg-bulle-wrap.eux{align-self:flex-start;align-items:flex-start}
.msg-bulle{
  padding:11px 15px;border-radius:16px;font-size:.85rem;line-height:1.55;word-break:break-word;
}
.msg-bulle-wrap.moi .msg-bulle{
  background:linear-gradient(135deg,var(--or),var(--or-h));
  color:var(--texte-fonce);border-bottom-right-radius:4px;
}
.msg-bulle-wrap.eux .msg-bulle{
  background:var(--nuit4);border:1px solid var(--bordure);
  color:var(--txt);border-bottom-left-radius:4px;
}
.msg-heure{font-size:.65rem;color:var(--txt3);padding:0 4px}
/* Zone saisie */
.msg-saisie{
  padding:16px 24px;border-top:1px solid var(--bordure);
  background:var(--nuit3);flex-shrink:0;
}
.msg-saisie-wrap{
  display:flex;align-items:flex-end;gap:12px;
  background:rgba(255,255,255,.05);border:1px solid var(--bordure);
  border-radius:16px;padding:12px 16px;transition:border-color .15s;
}
.msg-saisie-wrap:focus-within{border-color:rgba(229,193,88,.3)}
.msg-textarea{
  flex:1;background:none;border:none;color:var(--txt);font-family:"Inter",sans-serif;
  font-size:.88rem;resize:none;outline:none;max-height:120px;overflow-y:auto;line-height:1.5;
}
.msg-textarea::placeholder{color:rgba(148,163,184,.4)}
.msg-saisie-actions{display:flex;align-items:center;gap:8px;flex-shrink:0}
.msg-saisie-ico{
  width:32px;height:32px;border-radius:50%;
  background:none;border:none;color:var(--txt3);cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:color .15s;
}
.msg-saisie-ico:hover{color:var(--txt2)}
.msg-send{
  width:36px;height:36px;border-radius:50%;
  background:var(--or);border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all .15s;color:var(--texte-fonce);
}
.msg-send:hover{background:var(--or-h);transform:scale(1.05)}
/* État vide chat */
.msg-vide{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:16px;color:var(--txt3);
}

/* ——————————————————————————
   OVERHAUL PREMIUM MESSAGES
   —————————————————————————— */

/* Sidebar premium */
.msg-sidebar{
  background:rgba(8,10,18,.7);
  border-right:1px solid rgba(255,255,255,.07);
  backdrop-filter:blur(20px);
}
.msg-sidebar-header{
  border-bottom:1px solid rgba(255,255,255,.07);
  background:rgba(8,10,18,.4);
}
.msg-sidebar-titre{letter-spacing:-.02em;font-size:1.05rem}

/* Search bar premium */
.msg-search-inp{
  background:rgba(255,255,255,.05);
  border:1px solid rgba(255,255,255,.09);
  border-radius:12px;
  padding:10px 14px 10px 36px;
  transition:border-color .2s,background .2s,box-shadow .2s;
}
.msg-search-inp:focus{
  border-color:rgba(229,193,88,.35);
  background:rgba(255,255,255,.07);
  box-shadow:0 0 0 3px rgba(229,193,88,.07);
}

/* Conversations */
.msg-conv{border-radius:12px;transition:background .15s,border-color .15s}
.msg-conv:hover{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08)}
.msg-conv.actif{
  background:rgba(229,193,88,.08);
  border:1px solid rgba(229,193,88,.2);
  box-shadow:0 0 16px rgba(229,193,88,.06);
}
.msg-conv-avatar{box-shadow:0 0 0 2px rgba(255,255,255,.06);transition:box-shadow .2s}
.msg-conv.actif .msg-conv-avatar{box-shadow:0 0 0 2px rgba(229,193,88,.3)}

/* Chat header */
.msg-chat-header{
  background:rgba(8,10,18,.8);
  backdrop-filter:blur(20px);
  border-bottom:1px solid rgba(255,255,255,.07);
  box-shadow:0 1px 24px rgba(0,0,0,.3);
}
.msg-chat-action{
  border-radius:10px;
  transition:all .18s cubic-bezier(.34,1.56,.64,1);
}
.msg-chat-action:hover{
  background:rgba(229,193,88,.08);
  border-color:rgba(229,193,88,.25);
  color:var(--or);
  transform:scale(1.08);
}

/* Bulles messages améliorées */
.msg-bulle-wrap.moi .msg-bulle{
  background:linear-gradient(135deg,#E5C158,#C9A53F);
  box-shadow:0 4px 16px rgba(229,193,88,.25),inset 0 1px 0 rgba(255,255,255,.2);
  border-radius:18px 18px 4px 18px;
}
.msg-bulle-wrap.eux .msg-bulle{
  background:rgba(255,255,255,.06);
  border:1px solid rgba(255,255,255,.09);
  backdrop-filter:blur(8px);
  border-radius:18px 18px 18px 4px;
}

/* Zone saisie premium */
.msg-saisie{
  background:rgba(8,10,18,.9);
  backdrop-filter:blur(20px);
  border-top:1px solid rgba(255,255,255,.07);
}
.msg-saisie-wrap{
  background:rgba(255,255,255,.05);
  border:1px solid rgba(255,255,255,.09);
  border-radius:18px;
  transition:border-color .2s,box-shadow .2s;
}
.msg-saisie-wrap:focus-within{
  border-color:rgba(229,193,88,.35);
  box-shadow:0 0 0 3px rgba(229,193,88,.06);
}

/* Bouton envoyer premium */
.msg-send{
  background:linear-gradient(135deg,#E5C158,#C9A53F);
  box-shadow:0 4px 14px rgba(229,193,88,.3),inset 0 1px 0 rgba(255,255,255,.2);
  transition:all .22s cubic-bezier(.34,1.56,.64,1);
}
.msg-send:hover{
  transform:scale(1.1) translateY(-1px);
  box-shadow:0 8px 20px rgba(229,193,88,.45),inset 0 1px 0 rgba(255,255,255,.2);
}

/* Séparateur date */
.msg-date-sep span{
  background:rgba(8,10,18,.9);
  font-size:.65rem;
  letter-spacing:.08em;
  text-transform:uppercase;
  padding:2px 14px;
  border-radius:999px;
  border:1px solid rgba(255,255,255,.07);
}
.msg-date-sep::before{background:rgba(255,255,255,.06)}

/* Badge non lu */
.msg-conv-badge{
  background:linear-gradient(135deg,#E5C158,#C9A53F);
  box-shadow:0 2px 8px rgba(229,193,88,.4);
}

/* Icône badge sidebar */
.msg-sidebar-nb{
  background:linear-gradient(135deg,#E5C158,#C9A53F);
  color:var(--texte-fonce);
  box-shadow:0 2px 8px rgba(229,193,88,.35);
}
</style>
</head>
<body>
<div id="nav-root"></div>

<div class="msg-wrap">
  <!-- Sidebar -->
  <div class="msg-sidebar">
    <div class="msg-sidebar-header">
      <div class="msg-sidebar-titre">Messages</div>
      <span class="msg-sidebar-nb" id="nbNonLus">0</span>
    </div>
    <div class="msg-search">
      <div class="msg-search-wrap">
        <svg class="msg-search-ico" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="search" class="msg-search-inp" id="searchConv" placeholder="Rechercher une conversation..." oninput="filtrerConvs(this.value)">
      </div>
    </div>
    <div class="msg-convs" id="listeConvs"></div>
  </div>

  <!-- Zone chat -->
  <div class="msg-chat-area" id="chatArea">
    <div class="msg-vide" id="chatVide">
      <svg width="52" height="52" viewBox="0 0 24 24" fill="none" stroke="rgba(229,193,88,.2)" stroke-width="1.2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      <div style="font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;font-size:1rem;color:var(--txt2)">Sélectionnez une conversation</div>
      <div style="font-size:.82rem;color:var(--txt3)">Vos échanges avec artistes et labels apparaissent ici.</div>
    </div>
  </div>
</div>

<script src="../js/store.js"></script>
<script src="../js/app.js"></script>
<script src="../js/navigation.js"></script>
<script>
let convActive = null;
let toutes = [];

function fmtHeure(ts){
  const d = new Date(ts);
  const now = new Date();
  const diff = now - d;
  if(diff < 86400000) return d.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});
  if(diff < 604800000) return ['Dim','Lun','Mar','Mer','Jeu','Ven','Sam'][d.getDay()];
  return d.toLocaleDateString('fr-FR',{day:'2-digit',month:'2-digit'});
}

function rendreSidebar(convs){
  const cont = document.getElementById('listeConvs');
  const nb = document.getElementById('nbNonLus');
  const nls = convs.filter(c=>!c.lu).length;
  nb.textContent = nls;
  nb.style.display = nls > 0 ? '' : 'none';
  cont.innerHTML = convs.map(conv => {
    const actif = convActive && convActive.id === conv.id;
    return `<div class="msg-conv${actif?' actif':''}" onclick="ouvrirConv('${conv.id}')">
      <div class="msg-conv-avatar" style="background:${conv.couleur}22;color:${conv.couleur}">${conv.avatar}</div>
      <div class="msg-conv-body">
        <div class="msg-conv-header">
          <div class="msg-conv-nom">${conv.nom_contact}</div>
          <div class="msg-conv-heure">${fmtHeure(conv.horodatage)}</div>
        </div>
        <div class="msg-conv-dernier">${conv.dernierMessage}</div>
      </div>
      ${!conv.lu?`<div class="msg-conv-badge">1</div>`:''}
    </div>`;
  }).join('') || '<div style="padding:24px;text-align:center;font-size:.82rem;color:var(--txt3)">Aucune conversation</div>';
}

function ouvrirConv(convId){
  const convs = PeaklyStore.getMessages();
  const conv = convs.find(c=>c.id===convId);
  if(!conv) return;
  convActive = conv;
  conv.lu = true;
  localStorage.setItem('pkly_messages', JSON.stringify(convs));
  rendreSidebar(convs);

  const area = document.getElementById('chatArea');
  area.innerHTML = `
    <div class="msg-chat-header">
      <div class="msg-chat-avatar" style="background:${conv.couleur}22;color:${conv.couleur}">${conv.avatar}</div>
      <div class="msg-chat-infos">
        <div class="msg-chat-nom">${conv.nom_contact}</div>
        <div class="msg-chat-statut">En ligne</div>
      </div>
      <div class="msg-chat-actions">
        <div class="msg-chat-action" title="Voir le profil" onclick="window.location.href='/profil-pro.html'">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        </div>
        <div class="msg-chat-action" title="Archiver">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="21 8 21 21 3 21 3 8"/><rect x="1" y="3" width="22" height="5"/><line x1="10" y1="12" x2="14" y2="12"/></svg>
        </div>
      </div>
    </div>
    <div class="msg-bulles" id="builles"></div>
    <div class="msg-saisie">
      <div class="msg-saisie-wrap">
        <textarea class="msg-textarea" id="msgInput" placeholder="Votre message..." rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
        <div class="msg-saisie-actions">
          <button class="msg-saisie-ico" title="Pièce jointe">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
          </button>
          <button class="msg-send" onclick="envoyerMsg()" title="Envoyer">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
          </button>
        </div>
      </div>
    </div>`;

  rendreMessages(conv.messages);
  setTimeout(()=>document.getElementById('msgInput')?.focus(), 50);
}

function rendreMessages(msgs){
  const cont = document.getElementById('builles');
  if(!cont) return;
  cont.innerHTML = '';
  let lastDate = null;
  msgs.forEach(m => {
    const d = new Date(m.ts);
    const dateStr = d.toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long'});
    if(dateStr !== lastDate){
      cont.innerHTML += `<div class="msg-date-sep"><span>${dateStr}</span></div>`;
      lastDate = dateStr;
    }
    const side = m.de === 'moi' ? 'moi' : 'eux';
    cont.innerHTML += `<div class="msg-bulle-wrap ${side}">
      <div class="msg-bulle">${m.texte}</div>
      <div class="msg-heure">${d.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'})}</div>
    </div>`;
  });
  cont.scrollTop = cont.scrollHeight;
}

function envoyerMsg(){
  if(!convActive) return;
  const inp = document.getElementById('msgInput');
  const txt = inp.value.trim();
  if(!txt) return;
  PeaklyStore.envoyerMessage(convActive.id, txt);
  inp.value = '';
  inp.style.height = '';
  convActive = PeaklyStore.getMessages().find(c=>c.id===convActive.id);
  rendreMessages(convActive.messages);
  rendreSidebar(PeaklyStore.getMessages());
  /* Réponse automatique simulée */
  setTimeout(()=>{
    const repMessages = [
      'Merci pour votre message, nous reviendrons vers vous rapidement.',
      'C\'est noté ! On regarde ça de notre côté.',
      'Parfait. Pouvez-vous nous envoyer votre EPK complet ?',
      'Excellent timing. On est justement en phase de scouting ce mois-ci.',
    ];
    const rep = repMessages[Math.floor(Math.random()*repMessages.length)];
    PeaklyStore.envoyerMessage && (() => {
      const convs = PeaklyStore.getMessages();
      const c = convs.find(cv=>cv.id===convActive.id);
      if(c){ c.messages.push({de:'eux',texte:rep,ts:Date.now()}); c.dernierMessage=rep; c.horodatage=Date.now(); localStorage.setItem('pkly_messages',JSON.stringify(convs)); }
      if(convActive) rendreMessages(c ? c.messages : []);
      rendreSidebar(PeaklyStore.getMessages());
    })();
  }, 1500 + Math.random()*2000);
}

function handleKey(e){ if(e.key==='Enter' && !e.shiftKey){ e.preventDefault(); envoyerMsg(); } }
function autoResize(el){ el.style.height=''; el.style.height=Math.min(el.scrollHeight,120)+'px'; }
function filtrerConvs(q){
  const convs = PeaklyStore.getMessages().filter(c=>c.nom_contact.toLowerCase().includes(q.toLowerCase()));
  rendreSidebar(convs);
}

/* Init */
toutes = PeaklyStore.getMessages();
rendreSidebar(toutes);
if(toutes.length > 0) ouvrirConv(toutes[0].id);
</script>
</body>
</html>
