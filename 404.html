<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Page introuvable — Peakly</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800;900&family=Inter:wght@400;500&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<style>
body{padding-top:0;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--nuit);text-align:center;overflow:hidden}
.err-num{font-family:"JetBrains Mono",monospace;font-weight:500;font-size:clamp(6rem,15vw,12rem);color:transparent;-webkit-text-stroke:1px rgba(229,193,88,.25);letter-spacing:-.05em;line-height:1;position:relative;z-index:1}
.err-num span{color:var(--or);-webkit-text-stroke:0}
.err-glow{position:absolute;width:400px;height:400px;border-radius:50%;background:radial-gradient(circle,rgba(229,193,88,.12),transparent 70%);pointer-events:none;top:50%;left:50%;transform:translate(-50%,-50%)}
.err-wrap{position:relative;display:flex;flex-direction:column;align-items:center;padding:40px 24px}
.err-titre{font-family:"Plus Jakarta Sans",sans-serif;font-weight:800;font-size:1.6rem;color:var(--txt);margin-bottom:12px;letter-spacing:-.02em}
.err-texte{font-size:.92rem;color:var(--txt2);max-width:380px;line-height:1.7;margin-bottom:36px}
.err-btns{display:flex;gap:12px;flex-wrap:wrap;justify-content:center}
.err-barre{max-width:440px;width:100%;position:relative;margin-bottom:32px}
.err-barre input{
  width:100%;padding:14px 20px 14px 48px;
  background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);
  border-radius:12px;font-size:.92rem;color:var(--txt);
  font-family:"Inter",sans-serif;outline:none;transition:border-color .2s;
}
.err-barre input:focus{border-color:rgba(229,193,88,.4)}
.err-barre input::placeholder{color:rgba(148,163,184,.4)}
.err-barre svg{position:absolute;left:16px;top:50%;transform:translateY(-50%);color:var(--txt3);pointer-events:none}
.err-liens{display:flex;gap:20px;margin-top:32px;flex-wrap:wrap;justify-content:center}
.err-lien{font-size:.82rem;color:var(--txt3);text-decoration:none;transition:color .15s}
.err-lien:hover{color:var(--or)}
/* Particules */
.part-bg{position:fixed;inset:0;pointer-events:none;overflow:hidden;z-index:0}
.part-bg span{position:absolute;width:2px;height:2px;border-radius:50%;background:rgba(229,193,88,.4);animation:float-part 10s infinite ease-in-out}
@keyframes float-part{0%,100%{transform:translateY(0) scale(1);opacity:.4}50%{transform:translateY(-20px) scale(1.5);opacity:.8}}

/* Premium 404 enhancements */
.err-num{
  background:linear-gradient(180deg,rgba(255,255,255,.9) 0%,rgba(255,255,255,.4) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  -webkit-text-stroke:0;
  filter:drop-shadow(0 0 40px rgba(229,193,88,.15));
}
.err-num span{
  background:linear-gradient(135deg,#F0D060,#E5C158);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  filter:drop-shadow(0 0 20px rgba(229,193,88,.5));
}
.err-glow{
  background:radial-gradient(circle,rgba(229,193,88,.14),transparent 65%);
  animation:glow-breathe 3s ease infinite;
}
@keyframes glow-breathe{0%,100%{opacity:.7;transform:translate(-50%,-50%) scale(1)}50%{opacity:1;transform:translate(-50%,-50%) scale(1.1)}}
.err-barre input{
  backdrop-filter:blur(12px);
  transition:border-color .2s,box-shadow .2s,background .2s;
}
.err-barre input:focus{
  border-color:rgba(229,193,88,.4);
  background:rgba(255,255,255,.08);
  box-shadow:0 0 0 3px rgba(229,193,88,.07);
}
</style>
  <script src="js/store.js"></script>
  <script src="js/navigation.js"></script>
</head>
<body>
<div id="nav-root"></div>
<div class="part-bg" id="partBg"></div>
<div class="err-glow"></div>
<div class="err-wrap">
  <div class="err-num"><span>4</span>0<span>4</span></div>
  <div class="err-titre">Cette page n'existe pas.</div>
  <div class="err-texte">Le contenu que vous cherchez a peut-être été déplacé, renommé ou supprimé. Utilisez la recherche ou retournez à l'accueil.</div>
  <div class="err-barre">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input type="search" placeholder="Rechercher un artiste, un label..." id="errSearch" onkeydown="rechercherErreur(event)">
  </div>
  <div class="err-btns">
    <button class="btn-primary" onclick="window.location.href='/feed.html'">Retour à l'accueil</button>
    <button class="btn-secondary" onclick="window.location.href='/pages/recherche.html'">Explorer Peakly</button>
  </div>
  <div class="err-liens">
    <a href="/feed.html" class="err-lien">Fil d'actualité</a>
    <a href="/profil-artiste.html" class="err-lien">Profils artistes</a>
    <a href="/crm.html" class="err-lien">Opportunités</a>
    <a href="/pages/messages.html" class="err-lien">Messages</a>
    <a href="#" class="err-lien">Support</a>
  </div>
</div>

<script>
(function(){
  const bg = document.getElementById('partBg');
  const positions = [[5,15],[20,70],[35,25],[50,80],[65,40],[80,10],[90,65],[15,50],[45,5],[70,85]];
  positions.forEach(([l,t],i)=>{
    const s = document.createElement('span');
    s.style.left=l+'%'; s.style.top=t+'%';
    s.style.animationDelay=(i*0.9)+'s';
    s.style.animationDuration=(8+i*0.4)+'s';
    bg.appendChild(s);
  });
})();
function rechercherErreur(e){
  if(e.key==='Enter'){
    const q = document.getElementById('errSearch').value.trim();
    if(q) window.location.href = '/pages/recherche.html?q='+encodeURIComponent(q);
  }
}
</script>
<script src="js/app.js"></script>
</body>
</html>
